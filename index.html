<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>A Question For You 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:  #e8637a;
      --blush: #f7c5ce;
      --cream: #fff8f9;
      --wine:  #8b2c42;
      --soft:  #f2e8eb;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      min-height: 100dvh;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      position: relative;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ---- Floating hearts ---- */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .heart-particle {
      position: absolute;
      bottom: -60px;
      opacity: 0;
      animation: floatUp linear infinite;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)      scale(0.8) rotate(-10deg); opacity: 0;   }
      10%  { opacity: 0.65; }
      90%  { opacity: 0.3;  }
      100% { transform: translateY(-110vh) scale(1.1) rotate(10deg);  opacity: 0;   }
    }

    /* ---- Card ---- */
    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      border-radius: 32px;
      padding: 52px 36px 48px;
      width: min(88vw, 380px);
      text-align: center;
      box-shadow:
        0 8px 32px rgba(232,99,122,0.16),
        0 2px 6px  rgba(232,99,122,0.08);
      border: 1.5px solid var(--blush);
      animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(36px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* ---- Heart ---- */
    .big-heart {
      font-size: clamp(3.5rem, 16vw, 5rem);
      display: inline-block;
      animation: heartbeat 1.6s ease-in-out infinite;
      filter: drop-shadow(0 4px 14px rgba(232,99,122,0.38));
      user-select: none;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1);    }
      14%       { transform: scale(1.22); }
      28%       { transform: scale(1);    }
      42%       { transform: scale(1.13); }
      56%       { transform: scale(1);    }
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.6rem, 6.5vw, 2rem);
      color: var(--wine);
      margin: 24px 0 8px;
      line-height: 1.25;
    }

    .subtitle {
      font-size: 0.88rem;
      color: #b08090;
      letter-spacing: 0.05em;
      margin-bottom: 36px;
    }

    /* ---- Yes button ---- */
    .btn-yes {
      display: block;
      width: 100%;
      cursor: pointer;
      border: none;
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--rose) 0%, var(--wine) 100%);
      color: #fff;
      font-size: 1.15rem;
      padding: 18px 0;
      box-shadow: 0 6px 22px rgba(232,99,122,0.40);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-yes:active {
      transform: scale(0.96);
      box-shadow: 0 3px 10px rgba(232,99,122,0.30);
    }

    /* ---- No button — floats over the whole screen ---- */
    .btn-no {
      position: fixed;
      z-index: 999;
      cursor: pointer;
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      letter-spacing: 0.05em;
      background: var(--soft);
      color: #c47a8a;
      font-size: 0.95rem;
      padding: 14px 32px;
      border: 1.5px solid var(--blush);
      /* initial: centred below card */
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 52px);
      transform: translateX(-50%);
      transition: left 0.13s cubic-bezier(.22,1,.36,1),
                  top  0.13s cubic-bezier(.22,1,.36,1),
                  bottom 0.13s;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      min-width: 88px;
      min-height: 48px;
    }

    /* ---- Yes screen ---- */
    .yes-message {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: popIn 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75); }
      to   { opacity: 1; transform: scale(1);    }
    }
    .yes-message .big-heart { font-size: clamp(4rem, 18vw, 5.5rem); }
    .yes-message h1          { color: var(--rose); font-size: clamp(1.8rem, 7vw, 2.3rem); }
    .yes-message p           { color: #b08090; font-size: 1rem; }
  </style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="card" id="card">
  <div id="question">
    <span class="big-heart">💗</span>
    <h1>Andrea, will you be my girlfriend?</h1>
    <p class="subtitle">feel free to say no ✨</p>
    <button class="btn-yes" id="btnYes">Yes 💕😅</button>
  </div>

  <div class="yes-message" id="yesMsg">
    <span class="big-heart">💖</span>
    <h1>We're a couple!</h1>
    
  </div>
</div>

<!-- No lives outside the card so it can roam freely -->
<button class="btn-no" id="btnNo">No💔☹️ </button>

<script>
  /* ---- Floating hearts ---- */
  const emojis = ['💗','💕','💓','💞','🌸','✨','💝','🌷'];
  const bg = document.getElementById('heartsBg');

  function spawnHeart() {
    const el = document.createElement('span');
    el.className = 'heart-particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    const dur = 6 + Math.random() * 8;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay    = (Math.random() * 3) + 's';
    el.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
    bg.appendChild(el);
    setTimeout(() => el.remove(), (dur + 4) * 1000);
  }
  for (let i = 0; i < 16; i++) spawnHeart();
  setInterval(spawnHeart, 1000);

  /* ---- Yes ---- */
  const btnYes = document.getElementById('btnYes');

  function showYes() {
    document.getElementById('question').style.display = 'none';
    document.getElementById('btnNo').style.display    = 'none';
    const msg = document.getElementById('yesMsg');
    msg.style.display = 'flex';
    for (let i = 0; i < 35; i++) setTimeout(spawnHeart, i * 65);
  }

  btnYes.addEventListener('click',    showYes);
  btnYes.addEventListener('touchend', e => { e.preventDefault(); showYes(); });

  /* ---- No — runs away ---- */
  const btnNo = document.getElementById('btnNo');
  const labels = ['No', 'Nope', 'Never?', 'Hmm…', 'Really??', '😅', '🥺', 'Okay fine…'];
  let noTaps = 0;
  let roaming = false; // true once we switch from fixed-bottom to fixed-xy

  function dodge(touchX, touchY) {
    noTaps++;
    btnNo.textContent = labels[Math.min(noTaps, labels.length - 1)];

    if (noTaps >= labels.length) {
      btnNo.textContent = '💕';
      setTimeout(showYes, 500);
      return;
    }

    // Grow the Yes button slightly each time
    const s = Math.min(1 + noTaps * 0.07, 1.65);
    btnYes.style.transform = `scale(${s})`;

    // Switch to x/y positioning so button can go anywhere on screen
    if (!roaming) {
      roaming = true;
      btnNo.style.bottom    = 'auto';
      btnNo.style.transform = 'none';
    }

    const bw = btnNo.offsetWidth  + 20;
    const bh = btnNo.offsetHeight + 20;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const cx = touchX != null ? touchX : vw / 2;
    const cy = touchY != null ? touchY : vh / 2;

    // Try up to 25 times to land somewhere far from the finger
    let nx, ny, tries = 0;
    do {
      nx = bw / 2 + Math.random() * (vw - bw);
      ny = bh / 2 + Math.random() * (vh - bh);
      const dx = nx - cx, dy = ny - cy;
      tries++;
    } while (Math.sqrt((nx-cx)**2 + (ny-cy)**2) < Math.min(vw, vh) * 0.3 && tries < 25);

    btnNo.style.left = nx + 'px';
    btnNo.style.top  = ny + 'px';
  }

  // Mobile: touchstart fires before the finger lifts, so the button is gone by tap time
  btnNo.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    dodge(t.clientX, t.clientY);
  }, { passive: false });

  // Desktop fallback
  btnNo.addEventListener('mouseenter', () => dodge(null, null));
  btnNo.addEventListener('click',      () => dodge(null, null));
</script>
</body>
</html>
